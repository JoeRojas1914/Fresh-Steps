{% macro table(headers) %}
<div class="table-wrapper">
<table class="table table--striped table--hover">
    <thead>
        <tr>
            {% for h in headers %}
                <th scope="col">{{ h }}</th>
            {% endfor %}
        </tr>
    </thead>
    <tbody>
        {{ caller() }}
    </tbody>
</table>
</div>
{% endmacro %}
