<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso rápido</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/pin.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/FreshStepsLogo.png') }}">
</head>

<body>

<div class="pin-container">
    <h2>Acceso</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="alert {{ category }}">
{{ msg }}
        </div>
      {% endfor %}
    {% endwith %}   

    <form method="POST" class="pin-form">

        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div style="position:relative;">
            <input
                type="password"
                name="pin"
                id="pinInput"
                maxlength="4"
                inputmode="numeric"
                pattern="[0-9]{4}"
                placeholder="••••"
                class="pin-input"
                required
            >
            <span id="togglePin" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:#94a3b8;display:flex;align-items:center;transition:color .15s;">
                <svg id="iconoOjoPin" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </span>
        </div>

        <button type="submit" class="pin-btn">Entrar</button>
    </form>

    <a href="{{ url_for('auth.login', admin=1) }}" class="admin-secret">
        ⚙
    </a>

</div>

<script>
    document.getElementById("togglePin").addEventListener("click", function() {
        const input = document.getElementById("pinInput");
        const show  = input.type === "password";
        input.type  = show ? "text" : "password";
        const ojo   = document.getElementById("iconoOjoPin");
        ojo.innerHTML = show
            ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
               <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
               <line x1="1" y1="1" x2="23" y2="23"/>`
            : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
               <circle cx="12" cy="12" r="3"/>`;
        this.style.color = show ? "#1e7fd6" : "#94a3b8";
    });
</script>
</body>
</html>
