<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/login.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/FreshStepsLogo.png') }}">
</head>

<body class="login-page">

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <img src="{{ url_for('static', filename='images/FreshStepsLogo.png') }}" alt="Fresh Steps">
        </div>

        <h2>BIENVENIDO</h2>
        <p class="login-subtitle">Inicia sesión para continuar</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, msg in messages %}
            <div class="alert {{ category }}">
        {{ msg }}
            </div>
          {% endfor %}
        {% endwith %}

        <form method="POST" class="login-form">

            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="input-group">
                <span class="input-icon"><i data-lucide="user" width="18" height="18"></i></span>
                <input type="text" name="usuario" placeholder="Usuario" required>
            </div>

            <div class="input-group password-group">
                <span class="input-icon"><i data-lucide="lock" width="18" height="18"></i></span>
                <input type="password" name="password" id="passwordInput" placeholder="Contraseña" required>
                <span class="toggle-password" id="togglePwd">
                    <svg id="iconoOjo" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </span>
            </div>

            <button type="submit" class="btn-login">
                Ingresar
            </button>

        </form>
        
        {% if session.get("pin_habilitado") %}
            <div class="login-divider">o</div>
            <a href="/pin" class="btn-pin">
                Acceso con PIN
            </a>
        {% endif %}
    </div>
</div>

<script>
    document.getElementById("togglePwd").addEventListener("click", function() {
        const input  = document.getElementById("passwordInput");
        const show   = input.type === "password";
        input.type   = show ? "text" : "password";
        const ojo = document.getElementById("iconoOjo");
        if (show) {
            ojo.innerHTML = `
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
            `;
        } else {
            ojo.innerHTML = `
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            `;
        }
    });
    lucide.createIcons();
</script>
</body>
</html>
